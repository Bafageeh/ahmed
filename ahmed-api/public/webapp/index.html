<title>Ahmed Web Test</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb;color:#0f172a}

<body>
<main class="page"><section class="card"><div class="badge">Ahmed Web Test</div><h1>اختبار نسخة الويب من تطبيق الجوال</h1><p>تم استبدال الصفحة القديمة. عند نجاح تصدير Expo Web ستظهر هنا نفس نسخة الجوال.</p><p>إذا بقيت هذه الصفحة ظاهرة، فمعناه أن تصدير Expo Web لم ينجح بعد أو أن النشر الأخير لم يعمل.</p><div class="warn">حدّث الصفحة بقوة بعد النشر: Ctrl + F5</div></section></main>
</body>
