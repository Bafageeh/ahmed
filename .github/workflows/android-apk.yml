name: Build Ahmed Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ahmed-mobile/**'
      - 'ahmed-api/app/Http/Controllers/Api/MonthlyIncomeController.php'
      - 'scripts/patch-*.py'
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 46

    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      EXPO_PUBLIC_API_URL: https://ahmed.pm.sa/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ahmed-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: ahmed-mobile
        run: npm install --legacy-peer-deps

      - name: Patch React Native Gradle toolchain resolver
        working-directory: ahmed-mobile
        run: |
          FILE="node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          if [ -f "$FILE" ]; then
            sed -i 's/org.gradle.toolchains.foojay-resolver-convention") version "0.5.0"/org.gradle.toolchains.foojay-resolver-convention") version "1.0.0"/g' "$FILE"
            sed -i 's/org.gradle.toolchains.foojay-resolver-convention") version("0.5.0")/org.gradle.toolchains.foojay-resolver-convention") version("1.0.0")/g' "$FILE"
            sed -i 's/org.gradle.toolchains.foojay-resolver-convention").version("0.5.0")/org.gradle.toolchains.foojay-resolver-convention").version("1.0.0")/g' "$FILE"
          fi

      - name: Write environment
        working-directory: ahmed-mobile
        run: echo "EXPO_PUBLIC_API_URL=https://ahmed.pm.sa/api" > .env

      - name: Regenerate valid Expo PNG assets
        working-directory: ahmed-mobile
        run: |
          python3 - <<'PY'
          import os, struct, zlib
          SIZE = 1024
          BG = (30, 16, 78, 255)
          CYAN = (48, 220, 230, 255)
          WHITE = (255, 255, 255, 255)
          CLEAR = (0, 0, 0, 0)
          def chunk(kind, data):
              return struct.pack('>I', len(data)) + kind + data + struct.pack('>I', zlib.crc32(kind + data) & 0xffffffff)
          def write_png(path, transparent=False):
              rows = []
              for y in range(SIZE):
                  row = bytearray([0])
                  for x in range(SIZE):
                      c = CLEAR if transparent else BG
                      if (x - 512) ** 2 + (y - 512) ** 2 < 360 ** 2: c = BG
                      if 310 <= x <= 390 and 350 <= y <= 760: c = CYAN
                      if 630 <= x <= 710 and 350 <= y <= 760: c = CYAN
                      if 390 <= x <= 630 and 350 <= y <= 430: c = CYAN
                      if 405 <= x <= 615 and 505 <= y <= 585: c = WHITE
                      row.extend(c)
                  rows.append(bytes(row))
              raw = b''.join(rows)
              png = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', SIZE, SIZE, 8, 6, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw, 9)) + chunk(b'IEND', b'')
              with open(path, 'wb') as f: f.write(png)
              print(path, os.path.getsize(path))
          os.makedirs('assets', exist_ok=True)
          write_png('assets/icon.png')
          write_png('assets/adaptive-icon.png', True)
          write_png('assets/splash-icon.png', True)
          PY
          file assets/icon.png assets/adaptive-icon.png assets/splash-icon.png

      - name: Apply mobile UI patches
        run: |
          python3 scripts/patch-moneymoon-topbar.py || true
          python3 scripts/patch-moneymoon-add-edit-flow.py || true
          python3 scripts/patch-moneymoon-compact-inline-edit.py || true
          python3 scripts/patch-basic-income-compact.py || true
          python3 scripts/patch-income-linked-sync-ui.py || true
          python3 scripts/patch-ahmed-icons.py || true
          python3 scripts/patch-com-monthly-person-net-income.py
          python3 scripts/patch-ta3meed-receipts-ui.py

      - name: Verify S-121 COM income patch
        run: |
          grep -R "COM: com_monthly_person_net" -n ahmed-mobile/AppShell.js || (echo "COM monthly person net patch was not applied" && exit 1)

      - name: Verify Ta3meed receipts UI patch
        run: |
          grep -R "لصق رسالة استلام تعميد" -n ahmed-mobile || (echo "Ta3meed receipt UI patch was not applied" && exit 1)
          grep -R "اعتماد الدفعة" -n ahmed-mobile || (echo "Ta3meed receipt apply button missing" && exit 1)

      - name: Prebuild Android project
        working-directory: ahmed-mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make Gradle executable
        working-directory: ahmed-mobile
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: ahmed-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        working-directory: ahmed-mobile
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/*.apk build-output/ahmed-release.apk
          ls -lh build-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed-android-apk
          path: ahmed-mobile/build-output/ahmed-release.apk
          if-no-files-found: error
          retention-days: 15
