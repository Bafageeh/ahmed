name: Patch APK icon and navigation fixes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/patch-apk-icon-and-navigation-fixes.yml"

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip apk patch]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply APK icon and navigation fixes
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path('ahmed-mobile')

          ui = root / 'UiIcon.js'
          ui.write_text("""export { default, ICON_COLOR, ICON_COLOR_SOFT, ICON_COLOR_DARK } from './UiTextIcon';
""", encoding='utf-8')

          compact = root / 'Ta3meedCompactFiltersScreen.js'
          text = compact.read_text(encoding='utf-8')
          text = text.replace(
            '<CompactFilter label="المستثمر" value={investorLabel} onPress={() => onOpenMore ? onOpenMore() : onBack?.()} />',
            '<CompactFilter label="المستثمر" value={investorLabel} onPress={() => setPicker(\'investor\')} />'
          )
          text = text.replace(
            'onPress={() => onOpenMore ? onOpenMore() : onBack?.()}\n        style={styles.investorFloatingButton}',
            'onPress={() => onOpenMore ? onOpenMore() : onBack?.()}\n        style={styles.moreFloatingButton}'
          )
          text = text.replace('investorFloatingButton: {', 'moreFloatingButton: {')
          compact.write_text(text, encoding='utf-8')

          wrapper = root / 'Ta3meedNoResetFilterScreen.js'
          text = wrapper.read_text(encoding='utf-8')
          text = text.replace(
            "screen = <Ta3meedCompactFiltersScreen key={screenKey} {...props} onOpenMore={openInvestorPickerFromLegacyButton} />;",
            "screen = <Ta3meedCompactFiltersScreen key={screenKey} {...props} />;"
          )
          wrapper.write_text(text, encoding='utf-8')

          app = root / 'app.json'
          app_text = app.read_text(encoding='utf-8')
          app_text = app_text.replace('"version": "1.0.7"', '"version": "1.0.8"')
          app_text = app_text.replace('"versionCode": 8', '"versionCode": 9')
          app.write_text(app_text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ahmed-mobile/UiIcon.js ahmed-mobile/UiTextIcon.js ahmed-mobile/Ta3meedCompactFiltersScreen.js ahmed-mobile/Ta3meedNoResetFilterScreen.js ahmed-mobile/app.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix APK icons and Ta3meed navigation [skip apk patch]"
            git push
          fi
# trigger patch rerun
