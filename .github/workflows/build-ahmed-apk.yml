name: Build Ahmed APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ahmed-mobile/**"
      - ".github/workflows/build-ahmed-apk.yml"

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ahmed-mobile
    env:
      CI: 1
      EXPO_NO_TELEMETRY: 1
      EXPO_PUBLIC_API_URL: https://ahmed.pm.sa/api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ahmed-mobile/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Ahmed app icon
        run: python3 scripts/generate_app_icon.py

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p apk
          cp android/app/build/outputs/apk/debug/*.apk apk/ahmed-debug.apk
          ls -lh apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ahmed-apk
          path: ahmed-mobile/apk/ahmed-debug.apk
          if-no-files-found: error
