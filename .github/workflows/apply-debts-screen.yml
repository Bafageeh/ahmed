name: Connect debts screen

on:
  push:
    paths:
      - 'tools/apply_debts_screen.py'

permissions:
  contents: write

jobs:
  connect-debts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply AppShell patch
        run: python3 tools/apply_debts_screen.py

      - name: Commit AppShell update
        run: |
          if git diff --quiet -- ahmed-mobile/AppShell.js; then
            echo "No AppShell changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ahmed-mobile/AppShell.js
          git commit -m "Connect debts screen to accounts"
          git push
