name: Fix Ta3meed Source Screen

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-ta3meed-screen-source.yml"

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[skip ta3meed source fix]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply source fix
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('ahmed-mobile/Ta3meedCompactFiltersScreen.js')
          text = path.read_text(encoding='utf-8')

          reset_line = "          {hasFilters ? <TouchableOpacity style={styles.resetButton} onPress={resetFilters} activeOpacity={0.85}><Text style={styles.resetButtonText}>إعادة الفلتر إلى نشط</Text></TouchableOpacity> : null}\n"
          text = text.replace(reset_line, '')

          old_sort = "]).sort((a, b) => withdrawalSortValue(b) - withdrawalSortValue(a));"
          new_sort = ""]).sort((a, b) => {\n      const dateTextOf = (item) => String(item?.maturity_date || item?.due_date || '').slice(0, 10);\n      const dateValueOf = (item) => {\n        const dateText = dateTextOf(item);\n        if (!dateText) return null;\n        const value = new Date(`${dateText}T00:00:00`).getTime();\n        return Number.isFinite(value) ? value : null;\n      };\n      const aValue = dateValueOf(a);\n      const bValue = dateValueOf(b);\n      const aMissing = aValue === null;\n      const bMissing = bValue === null;\n      if (aMissing && !bMissing) return -1;\n      if (!aMissing && bMissing) return 1;\n      if (!aMissing && !bMissing && aValue !== bValue) return aValue - bValue;\n      return String(a?.reference_number || a?.code || a?.id || '').localeCompare(String(b?.reference_number || b?.code || b?.id || ''), 'ar');\n    });"""
          if old_sort not in text and 'aMissing && !bMissing' not in text:
              raise SystemExit('Old Ta3meed sort line not found and new sort not present')
          text = text.replace(old_sort, new_sort)

          if 'إعادة الفلتر إلى نشط' in text:
              raise SystemExit('Reset filter text still exists')
          if 'aMissing && !bMissing' not in text:
              raise SystemExit('Maturity sort was not applied')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit fixed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ahmed-mobile/Ta3meedCompactFiltersScreen.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix Ta3meed source sorting and remove reset filter [skip ta3meed source fix]"
            git push
          fi
