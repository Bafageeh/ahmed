name: Apply Finance imports UI fix

on:
  push:
    paths:
      - 'tools/apply_finance_imports_fix.py'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply AppShell changes
        run: python3 tools/apply_finance_imports_fix.py

      - name: Commit updated AppShell
        run: |
          if git diff --quiet -- ahmed-mobile/AppShell.js; then
            echo "No AppShell changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ahmed-mobile/AppShell.js
          git commit -m "Translate Finance values and add pull refresh"
          git push
