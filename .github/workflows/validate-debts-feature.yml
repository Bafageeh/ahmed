name: Validate debts feature

on:
  push:
    paths:
      - 'tools/validate_debts.marker'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate PHP syntax
        run: |
          php -l ahmed-api/app/Http/Controllers/Api/DebtController.php
          php -l ahmed-api/database/migrations/2026_07_10_170000_create_debts_and_debt_installments_tables.php
          php -l ahmed-api/routes/api.php

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ahmed-mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: ahmed-mobile
        run: npm ci

      - name: Compile Expo web bundle
        working-directory: ahmed-mobile
        run: npx expo export --platform web --output-dir /tmp/ahmed-debts-web

      - name: Record successful validation
        run: |
          printf 'Debts feature validation passed at %s\n' "$(date -u +%FT%TZ)" > tools/debts-validation-passed.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/debts-validation-passed.txt
          git commit -m "Validate debts feature"
          git push
