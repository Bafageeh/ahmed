name: Patch Ta3meed search top

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/patch-ta3meed-search-top.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch active Ta3meed screen
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'ahmed-mobile/Ta3meedCompactFiltersScreen.js';
          let s = fs.readFileSync(path, 'utf8');

          s = s.replace(
            "import React, { useEffect, useMemo, useState } from 'react';",
            "import React, { useEffect, useMemo, useRef, useState } from 'react';"
          );

          if (!s.includes('const scrollRef = useRef(null);')) {
            s = s.replace(
              "  const [showSearch, setShowSearch] = useState(false);\n",
              "  const [showSearch, setShowSearch] = useState(false);\n  const scrollRef = useRef(null);\n  const searchInputRef = useRef(null);\n"
            );
          }

          if (!s.includes('const handleSearchPress = () => {')) {
            s = s.replace(
              "  const resetFilters = () => {\n    setInvestorFilter('all');\n    setCategoryFilter('all');\n    setStatusFilter('active');\n    setQuery('');\n  };\n\n",
              "  const resetFilters = () => {\n    setInvestorFilter('all');\n    setCategoryFilter('all');\n    setStatusFilter('active');\n    setQuery('');\n  };\n\n  const handleSearchPress = () => {\n    setShowSearch(true);\n\n    const scrollToSearch = () => {\n      scrollRef.current?.scrollTo({ y: 0, animated: false });\n    };\n\n    scrollToSearch();\n    requestAnimationFrame(() => {\n      scrollToSearch();\n      searchInputRef.current?.focus?.();\n    });\n    setTimeout(() => {\n      scrollToSearch();\n      searchInputRef.current?.focus?.();\n    }, 80);\n    setTimeout(scrollToSearch, 180);\n  };\n\n"
            );
          }

          s = s.replace(
            'onPress={() => setShowSearch((value) => !value)} activeOpacity={0.85}',
            'onPress={handleSearchPress} activeOpacity={0.85}'
          );

          s = s.replace(
            '<ScrollView contentContainerStyle={styles.content} refreshControl={<RefreshControl refreshing={refreshing} onRefresh={refresh} />} showsVerticalScrollIndicator={false}>',
            '<ScrollView ref={scrollRef} contentContainerStyle={styles.content} refreshControl={<RefreshControl refreshing={refreshing} onRefresh={refresh} />} showsVerticalScrollIndicator={false} keyboardShouldPersistTaps="handled">'
          );

          s = s.replace(
            '{showSearch ? <TextInput style={styles.searchInput} value={query} onChangeText={setQuery} placeholder="ابحث بالكود أو المستثمر أو التصنيف" placeholderTextColor="#94a3b8" textAlign="right" /> : null}',
            '{showSearch ? <TextInput ref={searchInputRef} style={styles.searchInput} value={query} onChangeText={setQuery} placeholder="ابحث بالكود أو المستثمر أو التصنيف" placeholderTextColor="#94a3b8" textAlign="right" /> : null}'
          );

          if (!s.includes('const scrollRef = useRef(null);')) {
            throw new Error('Patch did not apply: scrollRef missing');
          }
          if (!s.includes('onPress={handleSearchPress}')) {
            throw new Error('Patch did not apply: search handler missing');
          }

          fs.writeFileSync(path, s);
          NODE

      - name: Commit patched file and remove one-time workflow
        run: |
          rm -f .github/workflows/patch-ta3meed-search-top.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ahmed-mobile/Ta3meedCompactFiltersScreen.js .github/workflows/patch-ta3meed-search-top.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix Ta3meed search scroll to top"
            git push
          fi
