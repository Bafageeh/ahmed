name: Ahmed Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ahmed-mobile/**'
      - '.github/workflows/ahmed-android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ahmed-mobile
    env:
      EXPO_PUBLIC_API_URL: https://ahmed.pm.sa/api
      EXPO_NO_TELEMETRY: 1
      CI: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ahmed-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ahmed-android-apk
          path: ahmed-mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
